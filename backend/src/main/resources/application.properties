spring.application.name=sinsay-poc

# SQLite Database
spring.datasource.url=jdbc:sqlite:./sinsay_poc.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# OpenAI / OpenRouter
openai.api-key=${OPENAI_API_KEY}
openai.base-url=${OPENAI_BASE_URL:https://openrouter.ai/api/v1}
openai.model=${OPENAI_MODEL:openai/gpt-4o-mini}

# Policy docs
policy-docs.path=${POLICY_DOCS_PATH:../docs}
